<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manual Técnico - PayCheckout</title>
    <meta name="description" content="Manual técnico completo do sistema PayCheckout." />
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background: #f5f7f8;
        color: #111827;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: #ffffff;
        border-bottom: 1px solid #e5e7eb;
      }
      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 16px;
      }
      .header-inner {
        min-height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        background: #fff;
        color: #111827;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        padding: 8px 12px;
      }
      .btn:hover {
        background: #f9fafb;
      }
      main {
        padding: 20px 0 28px;
      }
      h1 {
        margin: 0 0 14px;
        font-size: 26px;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 18px;
      }
      #status {
        margin-bottom: 12px;
        color: #4b5563;
        font-size: 14px;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 14px;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container header-inner">
        <strong>Manual Técnico (HTML)</strong>
        <div style="display:flex;gap:8px;">
          <a class="btn" href="/">Voltar</a>
          <a class="btn" href="/MANUAL_TECNICO.md" target="_blank" rel="noreferrer">Arquivo .md</a>
        </div>
      </div>
    </header>

    <main class="container">
      <h1>Manual Técnico Completo — PayCheckout</h1>
      <section class="card">
        <div id="status">Carregando conteúdo...</div>
        <pre id="manual"></pre>
      </section>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      const manualEl = document.getElementById("manual");

      fetch("/MANUAL_TECNICO.md")
        .then((res) => {
          if (!res.ok) throw new Error("Falha ao carregar o manual");
          return res.text();
        })
        .then((text) => {
          manualEl.textContent = text;
          statusEl.textContent = "";
        })
        .catch((err) => {
          statusEl.textContent = "Erro: " + (err?.message || "não foi possível carregar o manual");
        });
    </script>
  </body>
</html>
